[package]
name = "marco"
version = "0.1.0"
edition = "2021"

[dependencies]
gtk4 = "0.9"
glib = "0.20"
pulldown-cmark = "0.9"
gdk4 = "0.9"
sourceview5 = "0.9"
pango = "0.20"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
regex = "1.10"
webkit6 = "0.4.0"
lazy_static = "1.4"
syntect = { version = "5.2", default-features = false, features = ["default-fancy", "html", "parsing"] }
clap = { version = "4.5", features = ["derive"] }
gio = "0.20"
rayon = "1.8"
once_cell = "1.19"
num_cpus = "1.16"
zspell = "0.5"

[build-dependencies]
glib-build-tools = "0.20"

[profile.dev]
opt-level = 0
debug = true
debug-assertions = true
overflow-checks = true

[profile.release]
debug = true
opt-level = 3

[dev-dependencies]
serial_test = "3.2.0"
