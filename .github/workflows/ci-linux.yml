name: CI (Linux)

on:
  push:
    branches: ["**"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-audit:
    name: Security audit (RustSec)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain (pinned)
        id: toolchain
        uses: dtolnay/rust-toolchain@1.94.1

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: cargo-audit-linux-${{ steps.toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: |
          cargo install --locked cargo-audit --version 0.22.0

      - name: Run cargo audit
        run: |
          # Ignored advisories (transitive, no upstream fix available):
          #   RUSTSEC-2024-0320: yaml-rust unmaintained (via syntect 5.3.0)
          #   RUSTSEC-2024-0429: glib 0.18.5 unsoundness (via wry/webkit2gtk/tao GTK stack)
          cargo audit --deny warnings \
            --ignore RUSTSEC-2024-0320 \
            --ignore RUSTSEC-2024-0429

  test-linux:
    name: Test & lint (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain (pinned)
        id: toolchain
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-linux-ci-${{ steps.toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 \
            build-essential pkg-config \
            libgtk-4-dev libgtksourceview-5-dev libwebkitgtk-6.0-dev libfontconfig-dev

      - name: Format (rustfmt)
        run: cargo fmt --all --check

      - name: Tests (workspace)
        run: cargo test --workspace --locked

      - name: Clippy (workspace)
        run: cargo clippy --workspace --all-targets --locked
