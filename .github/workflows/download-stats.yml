name: Download Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'  # Every day at 08:00 UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Non-sensitive: target repository that stores aggregated stats snapshots.
  # Format: owner/repo
  STATS_REPO: Ranrar/stats

jobs:
  stats:
    name: Fetch release download counts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Fetch download counts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Build a JSON entry for this snapshot
          snapshot="$(gh api "/repos/${{ github.repository }}/releases" --jq '
            {
              date: (now | strftime("%Y-%m-%d")),
              run_id: "${{ github.run_id }}",
              releases: [
                .[] | {
                  tag: .tag_name,
                  assets: [
                    .assets[] | { name: .name, downloads: .download_count }
                  ]
                }
              ]
            }
          ')"

          echo "$snapshot" > snapshot.json

          # Write job summary table
          echo "## Marco Suite — Release Download Stats" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release | Asset | Downloads |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|----------:|" >> "$GITHUB_STEP_SUMMARY"
          echo "$snapshot" | jq -r '
            .releases[] | .tag as $tag | .assets[] |
            "| \($tag) | \(.name) | \(.downloads) |"
          ' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          total=$(echo "$snapshot" | jq '[.releases[].assets[].downloads] | add // 0')
          echo "**Total downloads across all releases:** ${total}" >> "$GITHUB_STEP_SUMMARY"

      - name: Save snapshot to private stats repo
        env:
          STATS_PAT: ${{ secrets.STATS }}
        run: |
          set -euo pipefail

          # Trim accidental CR/LF in secrets/vars.
          stats_pat="$(printf '%s' "${STATS_PAT:-}" | tr -d '\r\n')"
          raw_stats_repo="$(printf '%s' "${STATS_REPO:-}" | tr -d '\r\n')"

          if [ -z "$stats_pat" ]; then
            echo "ERROR: secret STATS is empty" >&2
            exit 1
          fi
          if [ -z "$raw_stats_repo" ]; then
            echo "ERROR: STATS_REPO is empty. Set workflow env STATS_REPO in owner/repo format." >&2
            exit 1
          fi

          # Accept either owner/repo or full GitHub URL and normalize to owner/repo.
          stats_repo="$raw_stats_repo"
          stats_repo="${stats_repo#https://github.com/}"
          stats_repo="${stats_repo#http://github.com/}"
          stats_repo="${stats_repo#github.com/}"
          stats_repo="${stats_repo%.git}"
          stats_repo="${stats_repo#/}"
          stats_repo="${stats_repo%/}"

          if [[ "$stats_repo" != */* ]]; then
            echo "ERROR: STATS_REPO must be in owner/repo format, got: '$stats_repo'" >&2
            exit 1
          fi
          if [[ "$stats_repo" == *" "* ]]; then
            echo "ERROR: STATS_REPO contains whitespace, got: '$stats_repo'" >&2
            exit 1
          fi

          # Avoid embedding PAT in URL (special chars can break URL parsing).
          auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$stats_pat" | base64 -w 0)"
          git -c "http.https://github.com/.extraheader=${auth_header}" clone "https://github.com/${stats_repo}.git" stats-repo

          # Append snapshot to stats.json (create if missing)
          stats_file="stats-repo/marco-stats.json"
          tmp_file="stats-repo/marco-stats.tmp.json"
          if [ -f "$stats_file" ]; then
            jq --slurpfile snap snapshot.json '. + $snap' "$stats_file" > "$tmp_file"
          else
            jq -n --slurpfile snap snapshot.json '$snap' > "$tmp_file"
          fi
          mv "$tmp_file" "$stats_file"

          cd stats-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add marco-stats.json
          if git diff --cached --quiet; then
            echo "No stats changes to commit"
            exit 0
          fi
          git commit -m "stats: $(date -u '+%Y-%m-%d') snapshot"
          git push
