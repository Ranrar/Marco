name: Beta Build

on:
  workflow_dispatch:  # Manual run only

jobs:
  linux:
    name: Build for Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install GTK dependencies
        run: sudo apt update && sudo apt install -y libgtk-4-dev pkg-config

      - name: Build for Linux
        run: cargo build --release

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: marco-linux
          path: target/release/marco

  windows:
    name: Build and Package for Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install MSYS2
        shell: powershell
        run: |
          Invoke-WebRequest -Uri https://repo.msys2.org/distrib/x86_64/msys2-x86_64-20230719.exe -OutFile msys2.exe
          Start-Process msys2.exe -ArgumentList '--quiet-mode --norestart' -Wait

      - name: Add MSYS2 to PATH
        shell: powershell
        run: |
          echo "C:\msys64\usr\bin" | Out-File -Append -Encoding ascii $env:GITHUB_PATH
          echo "C:\msys64\mingw64\bin" | Out-File -Append -Encoding ascii $env:GITHUB_PATH

      - name: Update MSYS2 and Install GTK4
        shell: msys2 {0}
        run: |
          pacman -Syuu --noconfirm
          pacman -Sy --noconfirm
          pacman -S --needed --noconfirm mingw-w64-x86_64-toolchain mingw-w64-x86_64-gtk4 git

      - name: Add Windows GNU target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Build for Windows
        shell: msys2 {0}
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Package App with GTK Runtime
        shell: powershell
        run: |
          mkdir dist\windows
          Copy-Item target\x86_64-pc-windows-gnu\release\marco.exe dist\windows\
          Copy-Item C:\msys64\mingw64\bin\*.dll dist\windows\
          Copy-Item -Recurse C:\msys64\mingw64\share dist\windows\share
          Copy-Item -Recurse C:\msys64\mingw64\lib dist\windows\lib
          Compress-Archive -Path dist\windows\* -DestinationPath dist\marco-windows.zip

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: marco-windows
          path: dist/marco-windows.zip
