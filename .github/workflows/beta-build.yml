name: Beta Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v3

      - name: Set up Rust stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          echo "deb http://archive.ubuntu.com/ubuntu jammy main universe" | sudo tee /etc/apt/sources.list.d/jammy-webkit.list
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkit2gtk-6.0-dev

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          choco install gtk4
          choco install webkitgtk6

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary (Linux only)
        if: runner.os == 'Linux'
        run: strip target/${{ matrix.target }}/release/marco || echo "strip not available"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v3
        with:
          name: marco-${{ matrix.target }}-beta
          path: target/${{ matrix.target }}/release/marco${{ runner.os == 'Windows' && '.exe' || '' }}
