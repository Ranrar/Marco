name: Build Marco on Fedora with WebKitGTK 6.0

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:38

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y \
            gtk4-devel \
            libsoup3-devel \
            javascriptcoregtk6-devel \
            webkit2gtk6-devel \
            pkgconfig \
            glib2-devel \
            make \
            gcc \
            rust cargo

      - name: Build in release mode
        run: cargo build --release

      - name: Run tests
        run: cargo test
