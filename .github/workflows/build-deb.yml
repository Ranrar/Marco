name: Build and Package .deb

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_deb:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f .github/docker/build_deb.dockerfile -t marco-builder .

      - name: Run build in Docker container
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace marco-builder \
            /bin/bash -c "cargo build --release && cargo deb --no-build"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: marco-deb
          path: target/debian/*.deb
