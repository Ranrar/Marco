name: Build and Package .deb with WebKitGTK 6

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build_deb:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f .github/docker/build_deb.dockerfile -t marco-builder .

      - name: Run build and collect .deb
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            marco-builder \
            bash -lc "cp target/debian/*.deb /app"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: marco-deb
          path: "*.deb"
