name: Build Marco

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add GNOME Nightly PPA for WebKitGTK
        run: |
          sudo add-apt-repository -y ppa:gnome-3-team/gnome-nightly
          sudo apt update

      - name: Install dependencies including libwebkit2gtk-6.0-dev
        run: |
          sudo apt install -y \
            libgtk-4-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-6.0-dev \
            libwebkit2gtk-6.0-dev \
            pkg-config \
            libglib2.0-dev \
            build-essential

      - name: Verify pkg-config paths
        run: pkg-config --modversion webkit2gtk-6.0

      - name: Build Rust project (release)
        run: cargo build --release
