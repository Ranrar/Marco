name: Build Marco

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update apt and search for webkit2gtk packages
        run: |
          sudo apt update
          echo "Searching for libwebkit2gtk packages:"
          apt-cache search libwebkit2gtk

      - name: Install dependencies with fallback for libwebkit2gtk
        run: |
          sudo apt update
          sudo apt install -y libgtk-4-dev libsoup-3.0-dev libjavascriptcoregtk-6.0-dev pkg-config libglib2.0-dev build-essential || true
          if ! sudo apt install -y libwebkit2gtk-6.0-dev; then
            echo "libwebkit2gtk-6.0-dev ikke fundet, prøver fallback til 4.0..."
            sudo apt install -y libwebkit2gtk-4.0-dev
          fi

      - name: Verify pkg-config paths
        run: pkg-config --modversion webkit2gtk-4.0 || pkg-config --modversion webkit2gtk-6.0

      - name: Build Rust project (release)
        run: cargo build --release
